<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<title>لوحة تحكم الشبكة</title>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.panel{
background:#1e293b;
padding:40px;
border-radius:20px;
width:420px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

h1{
margin-bottom:20px;
}

.stat{
background:#334155;
padding:15px;
border-radius:12px;
margin-top:15px;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:10px;
cursor:pointer;
background:#38bdf8;
color:white;
}

.cards{
margin-top:20px;
text-align:right;
max-height:200px;
overflow:auto;
background:#020617;
padding:10px;
border-radius:10px;
font-family:monospace;
}

</style>

</head>

<body>

<div class="panel">

<h1>لوحة التحكم</h1>

<div class="stat">
عدد الجلسات:
<span id="sessions">0</span>
</div>

<button onclick="generateCard()">توليد كرت جديد</button>

<div class="cards" id="cardsBox"></div>

<button onclick="resetStats()">تصفير الإحصائيات</button>

</div>

<script>

const CARDS_KEY="generated_cards";

function loadStats(){

const stats=localStorage.getItem("hotspot_stats") || 0;

document.getElementById("sessions").textContent=stats;

}

function loadCards(){

const cards=JSON.parse(localStorage.getItem(CARDS_KEY)) || [];

document.getElementById("cardsBox").innerHTML=cards.join("<br>");

}

function generateCard(){

const newCard="CARD-"+Math.random().toString(36).substring(2,8).toUpperCase();

let cards=JSON.parse(localStorage.getItem(CARDS_KEY)) || [];

cards.push(newCard);

localStorage.setItem(CARDS_KEY,JSON.stringify(cards));

loadCards();

}

function resetStats(){

localStorage.removeItem("hotspot_stats");

location.reload();

}

loadStats();
loadCards();

</script>

</body>
</html>
